
[env]
TERM = "xterm-256color"

[window]
padding = {x = 20, y = 25}
dynamic_padding = true
opacity = 1
decorations = "None"
startup_mode = "Maximized"

[font]
normal = { family = "RobotoMono Nerd Font", style = "Regular" }
bold = { family = "RobotoMono Nerd Font", style = "Bold" }
# italic = { family = "MartianMono Nerd Font", style = "Italic" }
# bold_italic = { family = "MartianMono Nerd Font", style = "Bold Italic" }
size = 14.0

[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

# [cursor]
# style = { shape = "Block", blinking = "Always" }

[general]
import = ["~/.config/alacritty/themes/rose_pine_dawn.toml"]
